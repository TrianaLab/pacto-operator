apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pacto-operator.fullname" . }}-manager
  labels:
    {{- include "pacto-operator.labels" . | nindent 4 }}
rules:
  # Core controller permissions
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, replicasets, statefulsets]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [cronjobs, jobs]
    verbs: [get, list, watch]
  # Pacto CRDs
  - apiGroups: [pacto.trianalab.io]
    resources: [pactos]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [pacto.trianalab.io]
    resources: [pactos/status]
    verbs: [get, patch, update]
  - apiGroups: [pacto.trianalab.io]
    resources: [pactos/finalizers]
    verbs: [update]
  - apiGroups: [pacto.trianalab.io]
    resources: [pactorevisions]
    verbs: [create, get, list, watch]
  - apiGroups: [pacto.trianalab.io]
    resources: [pactorevisions/status]
    verbs: [get, patch, update]
  {{- if .Values.dashboard.enabled }}
  # Dashboard lifecycle management
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [create, get, list, watch]
  - apiGroups: [""]
    resources: [serviceaccounts, services]
    verbs: [create, delete, get, list, update, watch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, delete, update]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles, clusterrolebindings]
    verbs: [create, delete, get, list, update, watch]
  {{- end }}
