{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pacto-operator.fullname" . }}-dashboard
  namespace: {{ .Values.dashboard.namespace | default .Release.Namespace }}
  labels:
    {{- include "pacto-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: 3000
      protocol: TCP
      {{- if and (eq .Values.dashboard.service.type "NodePort") .Values.dashboard.service.nodePort }}
      nodePort: {{ .Values.dashboard.service.nodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/name: pacto-dashboard
{{- end }}
