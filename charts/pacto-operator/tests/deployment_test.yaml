suite: deployment tests
templates:
  - templates/deployment.yaml
tests:
  - it: should create a Deployment
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1

  - it: should use the default image
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "ghcr.io/trianalab/pacto-operator/pacto-controller:.*"

  - it: should set security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should include leader-elect arg
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--leader-elect=true"

  - it: should include dashboard args when enabled
    set:
      dashboard.enabled: true
      dashboard.namespace: pacto-system
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--enable-dashboard"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--dashboard-namespace=pacto-system"

  - it: should not include dashboard args when disabled
    set:
      dashboard.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: "--enable-dashboard"
