name: CI
description: Shared CI step — setup Go and run a make target

inputs:
  target:
    description: Make target to run
    required: true
  golangci-lint:
    description: Install golangci-lint (needed for ci-static)
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6.3.0
      with:
        go-version: '1.26'

    - uses: actions/cache@v5.0.3
      with:
        path: |
          ~/.cache/go-build
          ${{ env.GOPATH }}/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download
      shell: bash

    - name: Install golangci-lint
      if: inputs.golangci-lint == 'true'
      uses: golangci/golangci-lint-action@v9.2.0
      with:
        install-only: true

    - name: Run make ${{ inputs.target }}
      run: make ${{ inputs.target }}
      shell: bash
