name: Auto release

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.bump.outputs.type == 'skip' }}
    steps:
      - name: Determine version bump
        id: bump
        run: |
          title="${{ github.event.pull_request.title }}"

          if [[ "$title" =~ ^[a-z]+(\(.+\))?\!: ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ "$title" =~ ^feat(\(.+\))?: ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$title" =~ ^(fix|perf|refactor)(\(.+\))?\!?: ]]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping release for: $title"
            echo "type=skip" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6.0.2
        if: steps.bump.outputs.type != 'skip'
        with:
          fetch-depth: 0

      - name: Calculate next version
        if: steps.bump.outputs.type != 'skip'
        id: version
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi

          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "${{ steps.bump.outputs.type }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Bumping ${{ steps.bump.outputs.type }}: $latest -> $next"

      - name: Create GitHub release
        if: steps.bump.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --target main

  docker-build:
    needs: release
    if: needs.release.outputs.skip != 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Extract versions
        id: meta
        run: |
          tag="${{ needs.release.outputs.tag }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          pacto_ver=$(go list -m -f '{{.Version}}' github.com/trianalab/pacto 2>/dev/null || echo "")
          echo "pacto_version=${pacto_ver#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: '1.25'

      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/trianalab/pacto-operator/pacto-controller:${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.release.outputs.tag }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.pull_request.merged_at }}
            DASHBOARD_IMAGE=ghcr.io/trianalab/pacto-dashboard:${{ steps.meta.outputs.pacto_version }}
          labels: |
            org.opencontainers.image.title=pacto-controller
            org.opencontainers.image.description=Pacto Operator controller for Kubernetes
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Export digest
        run: |
          digest="${{ steps.build.outputs.digest }}"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          retention-days: 1

  docker-merge:
    needs: [release, docker-build]
    if: needs.release.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Extract version
        id: meta
        run: |
          tag="${{ needs.release.outputs.tag }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create multi-arch manifest
        run: |
          image="ghcr.io/trianalab/pacto-operator/pacto-controller:${{ steps.meta.outputs.version }}"
          digests=$(printf "${image}@sha256:%s " $(ls /tmp/digests/))
          docker buildx imagetools create -t "${image}" ${digests}

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/trianalab/pacto-operator/pacto-controller:${{ steps.meta.outputs.version }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign controller image
        run: |
          digest=$(docker buildx imagetools inspect \
            "ghcr.io/trianalab/pacto-operator/pacto-controller:${{ steps.meta.outputs.version }}" \
            --format '{{json .Manifest.Digest}}' | tr -d '"')
          cosign sign --yes \
            "ghcr.io/trianalab/pacto-operator/pacto-controller:${{ steps.meta.outputs.version }}@${digest}"

  helm:
    needs: release
    if: needs.release.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Extract version
        id: meta
        run: |
          tag="${{ needs.release.outputs.tag }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Log in to GitHub Container Registry (Helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Log in to GitHub Container Registry (Cosign)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update chart version
        run: |
          version="${{ steps.meta.outputs.version }}"
          sed -i "s/^version:.*/version: ${version}/" charts/pacto-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${version}\"/" charts/pacto-operator/Chart.yaml

      - name: Regenerate chart README
        uses: losisin/helm-docs-github-action@v1.8.0
        with:
          chart-search-root: charts

      - name: Package and push Helm chart
        id: push
        run: |
          version="${{ steps.meta.outputs.version }}"
          helm package charts/pacto-operator
          output=$(helm push pacto-operator-${version}.tgz oci://ghcr.io/trianalab/charts 2>&1)
          echo "$output"
          digest=$(echo "$output" | grep -oP 'sha256:[a-f0-9]+')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign Helm chart
        run: |
          version="${{ steps.meta.outputs.version }}"
          cosign sign --yes \
            ghcr.io/trianalab/charts/pacto-operator:${version}@${{ steps.push.outputs.digest }}

      # Publish Artifact Hub repository metadata so the chart is indexed.
      # This pushes artifacthub-repo.yml as an OCI artifact with the reserved
      # "artifacthub.io" tag, which Artifact Hub polls for discovery.
      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Push Artifact Hub metadata
        run: |
          oras push ghcr.io/trianalab/charts/pacto-operator:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
