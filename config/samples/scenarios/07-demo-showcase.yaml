# Scenario 07: Demo Showcase — "Acme E-Commerce Platform"
#
# A cohesive mini-ecosystem designed for a 20-30s product demo.
# Demonstrates: dependency graphs, recursive navigation, multi-version
# diffing, breaking changes, internal/external deps, realistic contracts.
#
# Topology (3 layers):
#
#   EDGE        frontend (:3000) ──→ api-gateway (:8080)
#
#   DOMAIN      api-gateway ──→ auth-service (:8080)
#                            ──→ orders-service (:8080)
#                            ──→ payments-service (:8080)  ← HERO SERVICE
#
#   INFRA       auth-service ──→ redis (:6379)
#               orders-service ──→ postgresql (:5432)
#               payments-service ──→ postgresql (:5432)
#                                ──→ stripe-api (external :443)
#
# Multi-version story (payments-service):
#   v1.0.0 → v1.1.0 (non-breaking: adds webhook support)
#   v1.1.0 → v2.0.0 (BREAKING: replaces charges API with payment intents)
#
# Apply order:
#   1. kubectl apply -f 00-infrastructure.yaml
#   2. kubectl apply -f 07-demo-showcase.yaml
#   3. kubectl apply -f 07-demo-showcase-revisions.yaml
---
# ============================================================================
# LAYER 1: Infrastructure
# ============================================================================

# postgresql — primary datastore for orders and payments
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: postgresql
  namespace: demo
spec:
  target:
    serviceName: postgresql
    workloadRef:
      name: postgresql
      kind: Deployment
  checkIntervalSeconds: 120
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: postgresql
        version: "16.4.0"
        owner: platform/databases
        image:
          ref: docker.io/library/postgres:16.4
      interfaces:
        - name: sql
          type: grpc
          port: 5432
          visibility: internal
        - name: metrics
          type: http
          port: 9187
          visibility: internal
      configuration:
        schema: config-schema.json
        values:
          POSTGRES_DB: acme
          POSTGRES_MAX_CONNECTIONS: 200
          POSTGRES_PASSWORD: secret://vault/postgresql/password
      runtime:
        workload: service
        state:
          type: stateful
          persistence:
            scope: local
            durability: persistent
          dataCriticality: high
        lifecycle:
          upgradeStrategy: ordered
          gracefulShutdownSeconds: 60
        health:
          interface: metrics
          path: /health
        metrics:
          interface: metrics
          path: /metrics
      scaling:
        replicas: 1
      metadata:
        description: "Primary relational database. Stores orders, payments, and user data."
        layer: infrastructure
        tier: critical
        backup: daily
        storage-class: ssd
---
# redis — session store and auth token cache
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: redis
  namespace: demo
spec:
  target:
    serviceName: redis
    workloadRef:
      name: redis
      kind: Deployment
  checkIntervalSeconds: 120
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: redis
        version: "7.4.0"
        owner: platform/caching
        image:
          ref: docker.io/library/redis:7.4-alpine
      interfaces:
        - name: resp
          type: grpc
          port: 6379
          visibility: internal
        - name: metrics
          type: http
          port: 9121
          visibility: internal
      configuration:
        schema: config-schema.json
        values:
          REDIS_MAXMEMORY: 256mb
          REDIS_MAXMEMORY_POLICY: allkeys-lru
          REDIS_PASSWORD: secret://vault/redis/password
      runtime:
        workload: service
        state:
          type: stateful
          persistence:
            scope: local
            durability: persistent
          dataCriticality: medium
        lifecycle:
          upgradeStrategy: ordered
          gracefulShutdownSeconds: 30
        health:
          interface: metrics
          path: /health
        metrics:
          interface: metrics
          path: /metrics
      scaling:
        replicas: 1
      metadata:
        description: "In-memory cache for auth tokens and session data."
        layer: infrastructure
        tier: high
        eviction-policy: allkeys-lru
---
# stripe-api — external payment provider (definition-only, no runtime target)
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: stripe-api
  namespace: demo
spec:
  checkIntervalSeconds: 600
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: stripe-api
        version: "2024.12.0"
        owner: external/stripe
      interfaces:
        - name: payments-api
          type: http
          port: 443
          visibility: public
          contract: openapi.yaml
        - name: webhooks
          type: http
          port: 443
          visibility: public
      configuration:
        schema: config-schema.json
        values:
          BASE_URL: https://api.stripe.com/v1
          WEBHOOK_ENDPOINT: https://payments.acme.io/webhooks/stripe
          API_VERSION: "2024-12-18"
      metadata:
        description: "External payment provider. Processes charges, refunds, and payment intents."
        layer: external
        type: external
        provider: stripe.com
        sla: "99.99%"

---
# ============================================================================
# LAYER 2: Domain Services
# ============================================================================

# auth-service — JWT authentication and session management
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: auth-service
  namespace: demo
spec:
  target:
    serviceName: auth-service
  checkIntervalSeconds: 60
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: auth-service
        version: "2.3.0"
        owner: team/identity
        image:
          ref: ghcr.io/acme/auth-service:2.3.0
      interfaces:
        - name: http-api
          type: http
          port: 8080
          visibility: internal
          contract: openapi.yaml
      configuration:
        schema: config-schema.json
        values:
          JWT_ISSUER: https://auth.acme.io
          JWT_EXPIRY_SECONDS: 3600
          REFRESH_TOKEN_EXPIRY_DAYS: 30
          REDIS_URL: redis://redis:6379/0
          JWT_SECRET: secret://vault/auth-service/jwt-secret
          OAUTH_CLIENT_SECRET: secret://vault/auth-service/oauth-secret
      dependencies:
        - ref: oci://ghcr.io/acme/redis-pacto
          required: true
          compatibility: "^7.0.0"
      runtime:
        workload: service
        state:
          type: stateless
          persistence:
            scope: local
            durability: ephemeral
          dataCriticality: high
        lifecycle:
          upgradeStrategy: rolling
          gracefulShutdownSeconds: 15
        health:
          interface: http-api
          path: /health
        metrics:
          interface: http-api
          path: /metrics
      scaling:
        min: 2
        max: 8
      metadata:
        description: "Handles JWT authentication, OAuth2 flows, and session management."
        layer: domain
        team: identity
        tier: critical
        compliance: soc2
---
# orders-service — order lifecycle management
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: orders-service
  namespace: demo
spec:
  target:
    serviceName: orders-service
  checkIntervalSeconds: 60
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: orders-service
        version: "3.1.0"
        owner: team/commerce
        image:
          ref: ghcr.io/acme/orders-service:3.1.0
      interfaces:
        - name: http-api
          type: http
          port: 8080
          visibility: internal
          contract: openapi.yaml
        - name: order-events
          type: event
          visibility: internal
      configuration:
        schema: config-schema.json
        values:
          DATABASE_URL: postgres://postgresql:5432/acme_orders
          MAX_ORDER_ITEMS: 50
          ORDER_EXPIRY_MINUTES: 30
          DATABASE_PASSWORD: secret://vault/orders-service/db-password
      dependencies:
        - ref: oci://ghcr.io/acme/postgresql-pacto
          required: true
          compatibility: "^16.0.0"
      runtime:
        workload: service
        state:
          type: stateless
          persistence:
            scope: local
            durability: ephemeral
          dataCriticality: high
        lifecycle:
          upgradeStrategy: rolling
          gracefulShutdownSeconds: 15
        health:
          interface: http-api
          path: /health
        metrics:
          interface: http-api
          path: /metrics
      scaling:
        min: 2
        max: 10
      metadata:
        description: "Manages the full order lifecycle: creation, payment, fulfillment, and cancellation."
        layer: domain
        team: commerce
        tier: standard
---
# payments-service — payment processing (v2.0.0 — current, BREAKING from v1.x)
#
# This is the "hero" service for the demo. It has:
#   - The richest contract detail
#   - Multiple versions with a dramatic breaking change
#   - Both internal (postgres) and external (stripe) dependencies
#
# See 07-demo-showcase-revisions.yaml for version history (v1.0.0, v1.1.0)
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: payments-service
  namespace: demo
spec:
  target:
    serviceName: payments-service
  checkIntervalSeconds: 60
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: payments-service
        version: "2.0.0"
        owner: team/payments
        image:
          ref: ghcr.io/acme/payments-service:2.0.0
      interfaces:
        - name: http-api
          type: http
          port: 8080
          visibility: internal
          contract: openapi.yaml
        - name: payment-events
          type: event
          visibility: internal
      configuration:
        schema: config-schema.json
        values:
          DATABASE_URL: postgres://postgresql:5432/acme_payments
          STRIPE_ENDPOINT: https://api.stripe.com/v1
          IDEMPOTENCY_TTL_HOURS: 48
          CURRENCY_DEFAULT: usd
          STRIPE_SECRET_KEY: secret://vault/payments-service/stripe-secret-key
          WEBHOOK_SIGNING_SECRET: secret://vault/payments-service/webhook-secret
          DATABASE_PASSWORD: secret://vault/payments-service/db-password
      dependencies:
        - ref: oci://ghcr.io/acme/postgresql-pacto
          required: true
          compatibility: "^16.0.0"
        - ref: oci://ghcr.io/acme/stripe-api-pacto
          required: true
          compatibility: "^2024.0.0"
      runtime:
        workload: service
        state:
          type: stateless
          persistence:
            scope: local
            durability: ephemeral
          dataCriticality: high
        lifecycle:
          upgradeStrategy: rolling
          gracefulShutdownSeconds: 30
        health:
          interface: http-api
          path: /health
        metrics:
          interface: http-api
          path: /metrics
      scaling:
        replicas: 3
      metadata:
        description: "Processes all payments through Stripe. Handles payment intents, refunds, and webhook verification."
        layer: domain
        team: payments
        tier: critical
        pci-scope: "true"
        changelog: "v2.0.0: Migrated from Charges API to Payment Intents. BREAKING — POST /charges removed."

---
# ============================================================================
# LAYER 3: Edge
# ============================================================================

# api-gateway — routes and authenticates all client traffic
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: api-gateway
  namespace: demo
spec:
  target:
    serviceName: api-gateway
  checkIntervalSeconds: 60
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: api-gateway
        version: "1.5.0"
        owner: team/platform
        image:
          ref: ghcr.io/acme/api-gateway:1.5.0
      interfaces:
        - name: http-api
          type: http
          port: 8080
          visibility: internal
          contract: openapi.yaml
      configuration:
        schema: config-schema.json
        values:
          AUTH_SERVICE_URL: http://auth-service:8080
          ORDERS_SERVICE_URL: http://orders-service:8080
          PAYMENTS_SERVICE_URL: http://payments-service:8080
          RATE_LIMIT_RPS: 1000
          REQUEST_TIMEOUT_MS: 5000
          CORS_ALLOWED_ORIGINS: https://shop.acme.io
      dependencies:
        - ref: oci://ghcr.io/acme/auth-service-pacto
          required: true
          compatibility: "^2.0.0"
        - ref: oci://ghcr.io/acme/orders-service-pacto
          required: true
          compatibility: "^3.0.0"
        - ref: oci://ghcr.io/acme/payments-service-pacto
          required: true
          compatibility: "^2.0.0"
      runtime:
        workload: service
        state:
          type: stateless
          persistence:
            scope: local
            durability: ephemeral
          dataCriticality: low
        lifecycle:
          upgradeStrategy: rolling
          gracefulShutdownSeconds: 10
        health:
          interface: http-api
          path: /health
        metrics:
          interface: http-api
          path: /metrics
      scaling:
        min: 2
        max: 12
      metadata:
        description: "Central API gateway. Routes traffic, enforces authentication, and applies rate limiting."
        layer: edge
        team: platform
        tier: critical
---
# frontend — public-facing storefront
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: frontend
  namespace: demo
spec:
  target:
    serviceName: frontend
  checkIntervalSeconds: 60
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: frontend
        version: "4.2.0"
        owner: team/frontend
        image:
          ref: ghcr.io/acme/frontend:4.2.0
      interfaces:
        - name: http-ui
          type: http
          port: 3000
          visibility: public
          contract: openapi.yaml
      configuration:
        schema: config-schema.json
        values:
          API_GATEWAY_URL: http://api-gateway:8080
          CDN_URL: https://cdn.acme.io
          ANALYTICS_ID: UA-12345678-1
          SESSION_SECRET: secret://vault/frontend/session-secret
      dependencies:
        - ref: oci://ghcr.io/acme/api-gateway-pacto
          required: true
          compatibility: "^1.0.0"
      runtime:
        workload: service
        state:
          type: stateless
          persistence:
            scope: local
            durability: ephemeral
          dataCriticality: low
        lifecycle:
          upgradeStrategy: rolling
          gracefulShutdownSeconds: 5
        health:
          interface: http-ui
          path: /health
      scaling:
        min: 2
        max: 10
      metadata:
        description: "Customer-facing storefront. Single-page app served via CDN."
        layer: edge
        team: frontend
        tier: standard
