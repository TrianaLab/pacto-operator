# Infrastructure — Kubernetes Services and Deployments for all scenarios.
# Apply first: kubectl apply -f config/samples/scenarios/00-infrastructure.yaml
#
# Services are simulated with nginx — the operator only checks that the
# Service and Deployment (or StatefulSet) exist and expose the declared ports.
---
# ============================================================================
# Scenario 01: pacto-demo OCI services
# ============================================================================
# --- api (public gateway, port 8080) ---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: default
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: nginx:latest
          ports:
            - containerPort: 8080
---
# --- inference (ML processing, port 8082) ---
apiVersion: v1
