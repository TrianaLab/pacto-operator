# Scenario 07: Version history for payments-service
#
# Three PactoRevisions tell the evolution story:
#
#   v1.0.0 (Jan 2026)  — Baseline Charges API
#   v1.1.0 (Feb 2026)  — Non-breaking: adds webhook support
#   v2.0.0 (Mar 2026)  — BREAKING: replaces Charges with Payment Intents
#
# The breaking change in v2.0.0 is designed to be immediately obvious:
#
#   REMOVED  POST /charges              → use POST /payment-intents
#   REMOVED  GET  /charges/{id}         → use GET  /payment-intents/{id}
#   REMOVED  config: STRIPE_API_KEY     → renamed to STRIPE_SECRET_KEY
#   REMOVED  field: amount_cents        → replaced by amount + currency
#   ADDED    POST /payment-intents      (new endpoint)
#   ADDED    GET  /payment-intents/{id} (new endpoint)
#   ADDED    config: WEBHOOK_SIGNING_SECRET (required)
#   ADDED    config: CURRENCY_DEFAULT   (new)
#   ADDED    field: currency            (ISO 4217, required)
---
