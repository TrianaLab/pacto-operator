# ── v2.0.0 ── BREAKING CHANGE (Mar 2026) ───────────────────────────────
#
# Major migration from Charges API to Payment Intents API.
# This is a BREAKING change — consumers on v1.x must migrate.
#
# Removed endpoints:
#   POST /charges          ← REMOVED (was the primary payment endpoint)
#   GET  /charges/{id}     ← REMOVED
#
# Added endpoints:
#   POST /payment-intents         { amount, currency, payment_method }
#   GET  /payment-intents/{id}    → PaymentIntentObject
#
# Removed config:
#   STRIPE_API_KEY         ← REMOVED (renamed)
#
# Added config:
#   STRIPE_SECRET_KEY      (renamed from STRIPE_API_KEY)
#   WEBHOOK_SIGNING_SECRET (now required, was optional WEBHOOK_SECRET)
#   CURRENCY_DEFAULT       (new — default currency for payment intents)
#
# Schema changes:
#   amount_cents (integer) ← REMOVED
#   amount (integer)       → new field (amount in smallest currency unit)
#   currency (string)      → new required field (ISO 4217)
#
apiVersion: pacto.trianalab.io/v1alpha1
kind: PactoRevision
metadata:
  name: payments-service-2-0-0-b7c8d9e
  namespace: demo
  labels:
    pacto.trianalab.io/pacto: payments-service
    pacto.trianalab.io/version: "2.0.0"
    pacto.trianalab.io/layer: domain
  annotations:
    pacto.trianalab.io/changelog: "Migrated from Charges API to Payment Intents. BREAKING — POST /charges removed, config keys renamed."
    pacto.trianalab.io/compatibility: BREAKING
spec:
  pactoRef: payments-service
  version: "2.0.0"
  serviceName: payments-service
