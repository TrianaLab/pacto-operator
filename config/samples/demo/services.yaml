##
## Kubernetes Services — ports match contract interfaces
##
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: frontend
    pacto.trianalab.com/service: frontend
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: api-gateway
    pacto.trianalab.com/service: api-gateway
spec:
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: auth-service
    pacto.trianalab.com/service: auth-service
spec:
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9091
      targetPort: grpc
      protocol: TCP
---
