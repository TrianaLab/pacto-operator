## postgresql — primary relational database
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: postgresql
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: postgresql
    pacto.trianalab.com/service: postgresql
spec:
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: postgresql
        version: "16.0.0"
        owner: infra/databases
        image:
          ref: "docker.io/library/postgres:16"
      interfaces:
        - name: sql
          type: grpc
          port: 5432
          visibility: internal
          contract: openapi.yaml
      runtime:
        workload: service
        state:
          type: stateful
          persistence:
            scope: local
            durability: persistent
          dataCriticality: high
        lifecycle:
          upgradeStrategy: ordered
          gracefulShutdownSeconds: 120
      scaling:
        replicas: 1
      metadata:
        team: infrastructure
        tier: critical
        layer: infrastructure
  target:
    serviceName: postgresql
    workloadRef:
      name: postgresql
      kind: StatefulSet
---
