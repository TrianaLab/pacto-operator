## payments-service — payment processing (INTENTIONAL DRIFT)
##
## The payments team published contract v2.0.0 (new payment intents API,
## breaking change from v1.x charges API), but the deployment still runs
## the old image. This is the demo's primary failure: contract drift.
##
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: payments-service
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: payments-service
    pacto.trianalab.com/service: payments-service
spec:
  contractRef:
    oci: ghcr.io/trianalab/pacto-demo/payments-service
  target:
    serviceName: payments-service
    workloadRef:
      name: payments-service
      kind: Deployment
---
