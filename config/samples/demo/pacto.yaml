## payments-service — payment processing (INTENTIONAL DRIFT)
##
## The payments team published contract v2.0.0 (new payment intents API,
## breaking change from v1.x charges API), but the deployment still runs
## the old image. This is the demo's primary failure: contract drift.
##
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: payments-service
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: payments-service
    pacto.trianalab.com/service: payments-service
spec:
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: payments-service
        version: "2.0.0"
        owner: payments-team
        image:
          ref: "ghcr.io/trianalab/pacto-demo/payments-service:2.0.0"
      interfaces:
        - name: http
          type: http
          port: 8083
          visibility: internal
      dependencies:
        - ref: oci://ghcr.io/trianalab/pacto-demo/postgresql
          required: true
          compatibility: "^16.0.0"
        - ref: oci://ghcr.io/trianalab/pacto-demo/fraud-service
          required: true
          compatibility: "^1.0.0"
      configuration:
        schema: config-schema.json
        values:
          STRIPE_SECRET_KEY: "secret://vault/payments/stripe-secret-key"
          WEBHOOK_SIGNING_SECRET: "secret://vault/payments/webhook-signing-secret"
          PCI_AUDIT_LOG: "true"
      runtime:
        workload: service
        state:
          type: stateless
          persistence:
            scope: local
            durability: ephemeral
          dataCriticality: high
        lifecycle:
          upgradeStrategy: rolling
          gracefulShutdownSeconds: 60
      scaling:
        min: 3
        max: 8
      metadata:
        team: payments
        tier: critical
        layer: domain
  target:
    serviceName: payments-service
    workloadRef:
      name: payments-service
      kind: Deployment
