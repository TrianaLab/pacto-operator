##
## Root Pacto CR — single entry point for the entire platform demo.
## The operator resolves the full dependency graph from this contract.
## PactoRevisions are created automatically for each resolved version.
##
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: pacto-demo
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: pacto-demo
    pacto.trianalab.com/service: pacto-demo
spec:
  contractRef:
    oci: ghcr.io/trianalab/pacto-demo/pacto-demo
---
##
## Per-service Pacto CRs — enable runtime validation against live workloads.
## Inline contracts ensure the demo is self-contained and reproducible.
##

## frontend — public web UI, depends on api-gateway
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: frontend
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: frontend
    pacto.trianalab.com/service: frontend
spec:
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: frontend
        version: "1.0.0"
        owner: frontend-team
        image:
          ref: "ghcr.io/trianalab/pacto-demo/frontend:latest"
      interfaces:
        - name: http
          type: http
          port: 3000
          visibility: public
      dependencies:
        - ref: oci://ghcr.io/trianalab/pacto-demo/api-gateway
          required: true
          compatibility: "^1.0.0"
      runtime:
        workload: service
        state:
          type: stateless
          persistence:
            scope: local
            durability: ephemeral
          dataCriticality: low
        lifecycle:
          upgradeStrategy: rolling
          gracefulShutdownSeconds: 15
      scaling:
        min: 2
        max: 4
      metadata:
        team: frontend
        tier: standard
        layer: edge
  target:
    serviceName: frontend
    workloadRef:
      name: frontend
      kind: Deployment
---
## api-gateway — public edge proxy, routes to domain services
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: api-gateway
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: api-gateway
    pacto.trianalab.com/service: api-gateway
spec:
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: api-gateway
        version: "1.1.0"
        owner: platform-team
        image:
          ref: "ghcr.io/trianalab/pacto-demo/api-gateway:latest"
      interfaces:
        - name: http
          type: http
          port: 8080
          visibility: public
      dependencies:
        - ref: oci://ghcr.io/trianalab/pacto-demo/auth-service
          required: true
          compatibility: "^1.0.0"
        - ref: oci://ghcr.io/trianalab/pacto-demo/orders-service
          required: true
          compatibility: "^1.0.0"
        - ref: oci://ghcr.io/trianalab/pacto-demo/payments-service
          required: true
          compatibility: "^2.0.0"
      configuration:
        schema: config-schema.json
        values:
          RATE_LIMIT_RPS: "1000"
          REQUEST_TIMEOUT_MS: "5000"
      runtime:
        workload: service
        state:
          type: stateless
          persistence:
            scope: local
            durability: ephemeral
          dataCriticality: low
        lifecycle:
          upgradeStrategy: rolling
          gracefulShutdownSeconds: 30
      scaling:
        min: 2
        max: 6
      metadata:
        team: platform
        tier: critical
        layer: edge
  target:
    serviceName: api-gateway
    workloadRef:
      name: api-gateway
      kind: Deployment
---
## auth-service — identity and access management
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: auth-service
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: auth-service
    pacto.trianalab.com/service: auth-service
spec:
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: auth-service
        version: "1.0.0"
        owner: identity-team
        image:
          ref: "ghcr.io/trianalab/pacto-demo/auth-service:latest"
      interfaces:
        - name: http
          type: http
          port: 8081
          visibility: internal
        - name: grpc
          type: grpc
          port: 9091
          visibility: internal
          contract: openapi.yaml
      dependencies:
        - ref: oci://ghcr.io/trianalab/pacto-demo/redis
          required: true
          compatibility: "^7.0.0"
      configuration:
        schema: config-schema.json
        values:
          JWT_SECRET: "secret://vault/auth/jwt-secret"
          TOKEN_EXPIRY_SECONDS: "3600"
      runtime:
        workload: service
        state:
          type: stateless
          persistence:
            scope: local
            durability: ephemeral
          dataCriticality: medium
        lifecycle:
          upgradeStrategy: rolling
          gracefulShutdownSeconds: 30
      scaling:
        min: 2
        max: 4
      metadata:
        team: identity
        tier: critical
        layer: domain
  target:
    serviceName: auth-service
    workloadRef:
      name: auth-service
      kind: Deployment
---
## orders-service — order lifecycle management
apiVersion: pacto.trianalab.io/v1alpha1
kind: Pacto
metadata:
  name: orders-service
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: orders-service
    pacto.trianalab.com/service: orders-service
spec:
  contractRef:
    inline: |
      pactoVersion: "1.0"
      service:
        name: orders-service
        version: "1.1.0"
        owner: commerce-team
        image:
          ref: "ghcr.io/trianalab/pacto-demo/orders-service:latest"
      interfaces:
        - name: http
          type: http
          port: 8082
          visibility: internal
      dependencies:
        - ref: oci://ghcr.io/trianalab/pacto-demo/postgresql
          required: true
          compatibility: "^16.0.0"
      configuration:
        schema: config-schema.json
        values:
          ORDERS_DB_URL: "postgresql://orders:secret@postgresql:5432/orders"
          ORDER_RETENTION_DAYS: "365"
      runtime:
        workload: service
        state:
          type: stateless
          persistence:
            scope: local
            durability: ephemeral
          dataCriticality: medium
        lifecycle:
          upgradeStrategy: rolling
          gracefulShutdownSeconds: 30
      scaling:
        min: 2
        max: 4
      metadata:
        team: commerce
        tier: standard
        layer: domain
  target:
    serviceName: orders-service
    workloadRef:
      name: orders-service
      kind: Deployment
