##
## Deployments — stateless services
##
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: frontend
    pacto.trianalab.com/service: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        pacto.trianalab.com/service: frontend
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: frontend
          image: ghcr.io/trianalab/pacto-demo/frontend:latest
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: API_GATEWAY_URL
              value: "http://api-gateway:8080"
            - name: NODE_ENV
              value: "production"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: api-gateway
    pacto.trianalab.com/service: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        pacto.trianalab.com/service: api-gateway
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api-gateway
          image: ghcr.io/trianalab/pacto-demo/api-gateway:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8081"
            - name: ORDERS_SERVICE_URL
              value: "http://orders-service:8082"
            - name: PAYMENTS_SERVICE_URL
              value: "http://payments-service:8083"
            - name: RATE_LIMIT_RPS
              value: "1000"
            - name: REQUEST_TIMEOUT_MS
              value: "5000"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: auth-service
    pacto.trianalab.com/service: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        pacto.trianalab.com/service: auth-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: auth-service
          image: ghcr.io/trianalab/pacto-demo/auth-service:latest
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
            - containerPort: 9091
              name: grpc
              protocol: TCP
          env:
            - name: AUTH_DB_URL
              value: "postgresql://auth:secret@postgresql:5432/auth"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: JWT_SECRET
              value: "secret://vault/auth/jwt-secret"
            - name: TOKEN_EXPIRY_SECONDS
              value: "3600"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
