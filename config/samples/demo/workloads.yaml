##
## StatefulSets — stateful infrastructure
##
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: postgresql
    pacto.trianalab.com/service: postgresql
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  updateStrategy:
    type: OnDelete
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        pacto.trianalab.com/service: postgresql
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: postgresql
          image: postgres:16
          ports:
            - containerPort: 5432
              name: tcp-postgres
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "pacto"
            - name: POSTGRES_PASSWORD
              value: "secret://vault/infra/postgres-password"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "pacto"]
            initialDelaySeconds: 30
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "pacto"]
            initialDelaySeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: redis
    pacto.trianalab.com/service: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  updateStrategy:
    type: OnDelete
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        pacto.trianalab.com/service: redis
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
              name: tcp-redis
              protocol: TCP
          env:
            - name: REDIS_PASSWORD
              value: "secret://vault/infra/redis-password"
            - name: REDIS_MAXMEMORY
              value: "256mb"
            - name: REDIS_MAXMEMORY_POLICY
              value: "allkeys-lru"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
##
## CronJob — scheduled workload
##
apiVersion: batch/v1
kind: CronJob
metadata:
  name: notification-worker
  namespace: pacto-demo
  labels:
    app.kubernetes.io/name: notification-worker
    pacto.trianalab.com/service: notification-worker
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: notification-worker
        pacto.trianalab.com/service: notification-worker
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: notification-worker
            pacto.trianalab.com/service: notification-worker
        spec:
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 60
          containers:
            - name: notification-worker
              image: ghcr.io/trianalab/pacto-demo/notification-worker:latest
              env:
                - name: REDIS_URL
                  value: "redis://redis:6379/2"
                - name: EMAIL_PROVIDER_API_KEY
                  value: "secret://vault/notifications/email-api-key"
                - name: EMAIL_FROM
                  value: "noreply@pacto-demo.example.com"
                - name: BATCH_SIZE
                  value: "100"
                - name: RETRY_MAX_ATTEMPTS
                  value: "3"
